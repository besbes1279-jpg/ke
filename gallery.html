    <style>
        /* Navbar Title */
       :root {
  --bg: #F5F5DC;
  --card: #FFFFFF;
  --text: #2C2C2C;
  --accent: #8B4513;
  --secondary: #2F4F4F;
}

body.dark {
  --bg: #121212;
  --card: #1E1E1E;
  --text: #E0E0E0;
  --accent: #D4AF37;
  --secondary: #A0A0A0;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  transition: 0.3s;
}

h1,
h2,
h3,
h4,
h5,
h6 {
  font-family: "Cinzel Decorative", serif;
}

p {
  font-family: "Montserrat", sans-serif;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 25px;
  background: var(--card);
  border-bottom: 2px solid var(--accent);
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

.nav-links {
  list-style: none;
  display: flex;
  gap: 20px;
  padding: 0;
  margin: 0;
}

.nav-links a {
  text-decoration: none;
  color: var(--text);
  font-weight: bold;
}

.theme-btn {
  background: var(--accent);
  border: none;
  padding: 6px 12px;
  cursor: pointer;
}

footer {
  text-align: center;
  padding: 15px;
  background: var(--card);
  margin-top: 40px;
}

nav a {
  color: #fff;
  text-decoration: none;
  padding: 8px 15px;
  border-radius: 5px;
}

nav a:hover {
  color: #D4AF37;
  transition: 0.3s ease;
}
footer a {
    color: #D4AF37;   
    text-decoration: none;
}

footer a:hover {
    color: #b8952e;   
}
        #logo {
            font-size: 24px;
            color: var(--accent);
            letter-spacing: 1px;
        }

        a {
            padding: 5px 10px;
            text-decoration: none;
            border-radius: 35px;
            color: var(--text);
        }

        a:hover {
            color: var(--accent);
        }

        #t-btn {
            background-color: var(--accent);
            color: var(--card);
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
        }

        #t-btn:hover {
            background-color: var(--secondary);
            color: var(--text);
        }

        /* Gallery Section */
        h1 {
            text-align: center;
            margin-top: 20px;
            color: var(--accent);
        }


        #fm {
            padding: 10px;
            border: 1px solid var(--secondary);
            border-radius: 5px;
            width: 250px;
        }

        #btn {
            background-color: var(--accent);
            color: var(--card);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        #btn:hover {
            background-color: var(--secondary);
            color: var(--text);
        }

        .image {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 30px;
            padding: 20px;
        }

        .image .im {
            width:100%;
            /* عرض ثابت */
            height: 250px;
            /* ارتفاع ثابت */
            object-fit: cover;
            /* يخلي الصورة كفر مظبوط */
            border-radius: 10px;
            /* زوايا ناعمة */
            margin: 40px auto;
            /* مسافة بين الصور */
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            /* ظل خفيف */
            filter: brightness(0.95);
            /* درجة إضاءة بسيطة */
        }



        .image .im:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 15px var(--accent);
        }

        /* General */
        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
        }

        html {
            scroll-behavior: smooth;
        }

/* تنسيق منطقة الأزرار في الهيدر */
.auth-area {
    display: flex;
    gap: 10px;
    align-items: center;
}

#loginNav, #signupNav {
    padding: 8px 18px;
    border-radius: 20px;
    border: 1px solid var(--accent);
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

#loginNav {
    background: transparent;
    color: var(--text);
}

#signupNav {
    background: var(--accent);
    color: var(--card);
}

#loginNav:hover {
    background: var(--accent);
    color: var(--card);
}

#signupNav:hover {
    background: var(--secondary);
    border-color: var(--secondary);
}

/* تعديل للهواتف عشان الأزرار ما تضربش الشكل */
@media (max-width: 768px) {
    .navbar {
        flex-direction: column;
        gap: 15px;
    }
    .auth-area {
        margin-top: 10px;
    }
}
